# pixi workspace — seeded by `shipit install` (the managed blocks below
# need a valid manifest). Consumer-owned from here on: edit freely.
[workspace]
name = "lex"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64"]

[tasks]
# >>> shipit-managed tasks (do not edit; regenerate via `shipit install`) >>>
changelog = "./bin/shipit changelog"
lint = "./bin/shipit lint"
logs = "./bin/shipit logs"
provision-lexd = "./bin/shipit provision lexd"
# <<< shipit-managed tasks <<<

# Consumer-owned tasks (outside the shipit-managed block above).
# `test` runs the workspace suite via cargo-nextest — the runner lex's CI uses
# (.github/workflows test-rust.yml / sandbox-tests.yml). Without this, `pixi run
# test` falls through to the POSIX `test` builtin (silent exit 1, no suite run) —
# the #444 trap.
test = "cargo nextest run --workspace"
# The wf-checks TEST LANE's run (#828): the suite's fixtures live in the `comms`
# submodule, and the wf-checks block's checkout has no submodule support (the
# legacy rust-ci.yml caller passed `submodules: recursive`) — so the lane task
# provisions them inline, the same self-provisioning pattern as `lint-full`
# below. Idempotent and instant on a laptop where comms is already checked out.
test-full = "git submodule update --init --recursive && cargo nextest run --workspace"

[feature.lint.dependencies]
# >>> shipit-managed rust lint toolchain (do not edit; regenerate via `shipit install`) >>>
# The fleet-pinned rust lint toolchain (#547 Layer 1) — delivered because this
# repo tracks a Cargo.toml, which is exactly what makes the rust leg of `shipit
# lint` run (cargo clippy / cargo fmt per tracked manifest). conda-forge's
# `rust` is the official toolchain (cargo + clippy + rustfmt included), so the
# leg stops hard-failing (127) on hosts and CI runners without cargo (#526).
# Same pin as shipit's own [feature.test.dependencies] rust. If this repo no
# longer ships rust (the last Cargo.toml is gone), delete this block and its
# `pixi.toml#shipit-rust-lint-toolchain` entry in .shipit.toml's [managed]
# table — a reconcile only ADDS toolchain blocks, it never retires one.
rust = "1.96.*"
# <<< shipit-managed rust lint toolchain <<<
# >>> shipit-managed lint deps (do not edit; regenerate via `shipit install`) >>>
# The fleet-pinned lint toolchain (https://github.com/arthur-debert/shipit/blob/main/docs/legacy-prd/adoption.md:
# the managed set owns the consumer environment).
# Canonical versions live HERE — a bump is one data edit, rolled fleet-wide on
# each consumer's next `shipit install` reconcile.
ruff = "0.15.*"
# shellcheck is PINNED DOWN to 0.10.* (not 0.11): shellcheck 0.11.0 has an SC2218
# reaching-definitions false positive — a call to an EARLIER-defined function is
# flagged "defined later" when a subshell (`$(...)`, a pipeline component, `<(...)`)
# sits near the call, reddening the hermetic gate on CORRECT code across 5+ fleet
# repos. 0.11.0 is the latest upstream (no fixed 0.11.x yet); restore 0.11+ when
# upstream fixes it.
shellcheck = "0.10.*"
# conda-forge name for the `shfmt` binary
go-shfmt = "3.*"
yamllint = "1.38.*"
prettier = "3.8.*"
markdownlint-cli = "0.49.*"
# GitHub Actions workflow gate — the actions Lang of `shipit lint` (TOL01-WS04)
actionlint = "1.7.*"
lefthook = "2.1.*"
# <<< shipit-managed lint deps <<<

[feature.lint.tasks]
# The wf-checks LINT LANE's run (#828), byte-modeled on shipit's own: the lint
# toolchain (ruff/shfmt/prettier/markdownlint/actionlint/rust 1.96) lives in
# THIS feature's env, so the lane task must resolve into the lint env — the
# managed bare `lint` task is a fixed plain string that runs in the default env
# (where none of those tools exist on a hosted runner) and cannot provision the
# lex leg's lexd. `provision lexd` inline lands lexd in this env's prefix,
# idempotent. Defined ONLY in this feature, so it exists in EXACTLY ONE env
# (lint) and bare `pixi run lint-full` resolves unambiguously — the wf-checks
# matrix job's `pixi run --locked lint-full` and a laptop run are identical.
lint-full = { cmd = "./bin/shipit provision lexd && ./bin/shipit lint" }

[environments]
# >>> shipit-managed environments (do not edit; regenerate via `shipit install`) >>>
lint = ["lint"]
# <<< shipit-managed environments <<<

# Consumer-owned dependencies (outside the shipit-managed blocks above).
# cargo-nextest provisions the `test` task's runner FROM pixi, so `pixi run test`
# works in a clean pixi env — not only where nextest already happens to be on
# PATH. The Rust toolchain (cargo/rustc) is pinned here too (ADP02-WS02, #828):
# the wf-checks test lane runs `pixi run --locked test` on a hosted runner where
# nothing outside pixi is provisioned (hosted images no longer carry Rust, and
# the pinned planner emits no env/cache descriptors that would put a toolchain
# on PATH), so the default env must carry the full `cargo nextest` stack itself.
# Same conda-forge pin as the managed [feature.lint.dependencies] rust.
[dependencies]
# >>> shipit-managed node deps (do not edit; regenerate via `shipit install`) >>>
# The fleet-pinned node runtime (#547 Layer 1) — delivered because this repo
# tracks a package.json. Unlike the rust/go blocks this is NOT a linter
# toolchain: it provisions the repo's OWN node/pnpm runtime (npm rides the
# nodejs package), which is why it lives in the DEFAULT env's [dependencies]
# rather than the lint feature. If this repo no longer ships node (the last
# package.json is gone), delete this block and its `pixi.toml#shipit-node-deps`
# entry in .shipit.toml's [managed] table — a reconcile only ADDS toolchain
# blocks, it never retires one.
nodejs = "26.*"
pnpm = "11.*"
# <<< shipit-managed node deps <<<
# >>> shipit-managed rust release deps (do not edit; regenerate via `shipit install`) >>>
# The rust RELEASE-side bump tool (#793, the #784-F2 failure class): `shipit
# release prepare`'s rust bump adapter runs `cargo set-version --workspace`
# (a cargo-edit subcommand), and wf-prepare executes shipit in the DEFAULT
# pixi env (`pixi run --locked ./bin/shipit`), so cargo-edit anchors HERE —
# [dependencies], not a feature — where that run's PATH resolves it (cargo
# finds subcommands via $CARGO_HOME/bin then PATH, the #785 finding).
# Provisioned from conda-forge under setup-pixi's lockfile-keyed cache (the
# #582 doctrine: the release run NEVER `cargo install`s). Pinned to the patch
# line (`0.13.11.*` — conda match-spec, so any 0.13.11.x build resolves); a
# bump is one data edit, rolled out on each consumer's next `shipit install`
# reconcile. If this repo no longer ships rust (the last Cargo.toml is gone),
# delete this block and its `pixi.toml#shipit-rust-release-deps` entry in
# .shipit.toml's [managed] table — a reconcile only ADDS toolchain blocks, it
# never retires one.
cargo-edit = "0.13.11.*"
# The wasm/npm bundle composition's builder (TOL02-WS12 #788, WS10 DECIDED
# #798): `shipit release bundle`'s wasm-pack composition runs `wasm-pack build`
# to turn a rust crate into an npm package tree, then `npm pack`s the tarball
# — the artifact. wasm-pack is on conda-forge, so it anchors HERE (the rust
# release-deps block, rust signal) beside cargo-edit rather than
# self-provisioning (the cargo-deb #785 exception is for tools conda-forge does
# NOT carry). Provisioned under setup-pixi's lockfile-keyed cache (the #582
# doctrine: the release run NEVER installs at run time). Pinned to the
# minor line (`0.15.*` — conda match-spec); a bump is one data edit, rolled out
# on each consumer's next `shipit install` reconcile. 0.15.* per #846: the
# original 0.13.* pin was never solvable — conda-forge never published any
# 0.13.x wasm-pack build (verified on osx-arm64 + linux-64) — so every
# consumer's default env died at solve.
wasm-pack = "0.15.*"
# NOTE: wasm-pack does NOT pull the wasm32 target std — its only conda deps
# are __glibc/libgcc (osx: __osx), so the WS12 record's claim that it did was
# false (#853). The std is a sysroot COMPONENT, so it anchors in the
# rust-release-toolchain block beside `rust`, NOT here: it must be delivered
# (and skipped, when a consumer owns its `rust` pin) with the sysroot it
# belongs to, while this block delivers unconditionally on the rust signal.
# The Artifact channel's conda-endpoint packager (ARF01-WS01 #950, ADR-0064):
# `shipit release publish`'s conda endpoint runs `rattler-build build` to
# repackage a final release binary into a `.conda` and `rattler-build publish`
# to push+reindex the producing repo's per-repo channel. rattler-build is on
# conda-forge, so it anchors HERE (the rust release-deps block, rust signal)
# beside wasm-pack — the walking-skeleton producer (lex-fmt/lex → lexd) is a
# rust artifact, so the rust signal delivers it; a language-agnostic
# endpoint-gated home is future work. Provisioned under setup-pixi's
# lockfile-keyed cache (the #582 doctrine: the release run NEVER installs at run
# time — publish fails loudly naming this reconcile instead). Pinned to the
# minor line (`0.68.*` — conda match-spec); spike-validated at 0.68.0
# (ADR-0064). A bump is one data edit, rolled out on each consumer's next
# `shipit install` reconcile.
rattler-build = "0.68.*"
# <<< shipit-managed rust release deps <<<
cargo-nextest = ">=0.9.138,<0.10"
rust = "1.96.*"
# The wasm32 std target for `wasm-pack build` (lex#832). lex OWNS its `rust`
# pin here (consumer-owned, outside the managed rust-release-deps block), so
# the managed rust-release-toolchain block that would carry the wasm32 std is
# SKIPPED — same as phos-core#466. Without this, conda-forge's pinned `rust`
# ships no wasm32-unknown-unknown sysroot std, and the lex-wasm artifact's
# wasm-pack composition dies at "wasm32-unknown-unknown target not found in
# sysroot" (proven live on phos-core). Same 1.96.* line as `rust`.
rust-std-wasm32-unknown-unknown = "1.96.*"
# uv backs the pinned bin/shipit launcher (ADR-0033: it provisions the repo's
# pinned shipit via uv, PATH-independent). Both wf-checks lanes run
# `pixi run --locked <task>` -> ./bin/shipit on a hosted runner where uv is not
# otherwise present, so the launcher's one prerequisite must ride the env too.
# (Flagged upstream: the block/managed set should own this — lex#828/#829.)
uv = ">=0.5"
