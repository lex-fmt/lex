# pixi workspace — seeded by `shipit install` (the managed blocks below
# need a valid manifest). Consumer-owned from here on: edit freely.
[workspace]
name = "lex"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64"]

[tasks]
# >>> shipit-managed tasks (do not edit; regenerate via `shipit install`) >>>
changelog = "./bin/shipit changelog"
lint = "./bin/shipit lint"
logs = "./bin/shipit logs"
provision-lexd = "./bin/shipit provision lexd"
# <<< shipit-managed tasks <<<

# Consumer-owned tasks (outside the shipit-managed block above).
# `test` runs the workspace suite via cargo-nextest — the runner lex's CI uses
# (.github/workflows test-rust.yml / sandbox-tests.yml). Without this, `pixi run
# test` falls through to the POSIX `test` builtin (silent exit 1, no suite run) —
# the #444 trap.
test = "cargo nextest run --workspace"

[feature.lint.dependencies]
# >>> shipit-managed rust lint toolchain (do not edit; regenerate via `shipit install`) >>>
# The fleet-pinned rust lint toolchain (#547 Layer 1) — delivered because this
# repo tracks a Cargo.toml, which is exactly what makes the rust leg of `shipit
# lint` run (cargo clippy / cargo fmt per tracked manifest). conda-forge's
# `rust` is the official toolchain (cargo + clippy + rustfmt included), so the
# leg stops hard-failing (127) on hosts and CI runners without cargo (#526).
# Same pin as shipit's own [feature.test.dependencies] rust. If this repo no
# longer ships rust (the last Cargo.toml is gone), delete this block and its
# `pixi.toml#shipit-rust-lint-toolchain` entry in .shipit.toml's [managed]
# table — a reconcile only ADDS toolchain blocks, it never retires one.
rust = "1.96.*"
# <<< shipit-managed rust lint toolchain <<<
# >>> shipit-managed lint deps (do not edit; regenerate via `shipit install`) >>>
# The fleet-pinned lint toolchain (docs/prd/adoption.md: the managed set owns
# the consumer environment). Canonical versions live HERE — a bump is one data
# edit, rolled fleet-wide on each consumer's next `shipit install` reconcile.
ruff = "0.15.*"
# shellcheck is PINNED DOWN to 0.10.* (not 0.11): shellcheck 0.11.0 has an SC2218
# reaching-definitions false positive — a call to an EARLIER-defined function is
# flagged "defined later" when a subshell (`$(...)`, a pipeline component, `<(...)`)
# sits near the call, reddening the hermetic gate on CORRECT code across 5+ fleet
# repos. 0.11.0 is the latest upstream (no fixed 0.11.x yet); restore 0.11+ when
# upstream fixes it.
shellcheck = "0.10.*"
# conda-forge name for the `shfmt` binary
go-shfmt = "3.*"
yamllint = "1.38.*"
prettier = "3.8.*"
markdownlint-cli = "0.49.*"
# GitHub Actions workflow gate — the actions Lang of `shipit lint` (TOL01-WS04)
actionlint = "1.7.*"
lefthook = "2.1.*"
# <<< shipit-managed lint deps <<<

[environments]
# >>> shipit-managed environments (do not edit; regenerate via `shipit install`) >>>
lint = ["lint"]
# <<< shipit-managed environments <<<

# Consumer-owned dependencies (outside the shipit-managed blocks above).
# cargo-nextest provisions the `test` task's runner FROM pixi, so `pixi run test`
# works in a clean pixi env — not only where nextest already happens to be on
# PATH. The Rust toolchain itself (cargo/rustc) comes from the host, matching
# lex's CI (setup-rust), which is why only the nextest runner is pinned here.
[dependencies]
cargo-nextest = ">=0.9.138,<0.10"

# shipit-rc campaign (TOL02-WS07): the wf-* release blocks run
# `pixi run --locked ./bin/shipit …` in THIS repo's default env, and the
# bin/shipit launcher defers to a `shipit` on PATH — so the default env must
# carry the shipit CLI itself (pinned to the same commit as
# .shipit.toml [shipit].version), the rust toolchain the build/bump legs
# exec (cargo/rustc — wf-build runs on bare runners, nothing else provisions
# it there), and cargo-edit (`cargo set-version`, the rust bump adapter).
[dependencies.python]
version = "3.13.*"

[dependencies.rust]
version = "1.96.*"

[dependencies.cargo-edit]
version = ">=0.13"

# Vendored wheel built from arthur-debert/shipit @ ee6ea6c (the campaign
# head): a git dependency on the PRIVATE shipit repo cannot resolve on
# lex-fmt org runners (no cross-owner credential plumbing — campaign
# Finding 3), so the pin rides a committed wheel for the rc branch.
[pypi-dependencies.shipit]
path = "vendor/shipit-0.0.2-py3-none-any.whl"
