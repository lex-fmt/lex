name: Release

# Thin caller — the canonical pipeline lives at
# arthur-debert/release/.github/workflows/rust-cli.yml@v3.
# Bug fixes and improvements to the release pipeline come in via a
# bump of the @v3 floating ref, no changes here.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.9.1 or 0.10.0-rc.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    uses: arthur-debert/release/.github/workflows/rust-cli.yml@v3
    with:
      version: ${{ inputs.version }}
      # Topological dep order. lex-extension publishes the public handler
      # surface (trait, wire types, schema types). lex-extension-host
      # publishes the runtime (registry, transports, trust gate); it
      # depends on lex-extension and is depended on by lex-core (for the
      # built-in `lex.include` handler). lex-config depends on lex-babel
      # (not the other way around — CLAUDE.md was stale on this), so
      # lex-babel must publish before lex-config. lex-lsp-core depends on
      # lex-core + lex-babel and is depended on by lexd-lsp, so it sits
      # between them. lex-fmt bundles the boot helper for hosts (and,
      # from PR 11 onward, the public Engine::builder() facade) —
      # depends on lex-core + lex-config + lex-extension(-host) and is
      # depended on by both lexd-lsp and lexd, so it sits after the
      # leaves and before the binary crates. lex-wasm has publish = false
      # and isn't in the list.
      crates: "lex-extension,lex-extension-host,lex-core,lex-babel,lex-config,\
        lex-analysis,lex-lsp-core,lex-fmt,lexd-lsp,lexd"
      # Brew formula subject. The other binary (lexd-lsp) is built and
      # signed alongside but ships as a tarball-only artifact (editor
      # extensions bundle it themselves).
      bin-name: lexd
      extra-binaries: lexd-lsp
      # Defaults cover mac arm64 + linux x86_64-gnu + linux aarch64-gnu;
      # add musl + windows to match prior pipeline coverage.
      linux-musl-archs: 'x86_64'
      windows-archs: 'x86_64'
      submodules: true
      # WASM/npm slot (added in release@v1.2.0). Builds lex-wasm via
      # wasm-pack and publishes @lex-fmt/lex-wasm to npm. Replaces the
      # previous hand-rolled .github/workflows/release-wasm.yml (deleted
      # in this PR) — the canonical pipeline now does the build once and
      # distributes the artifact to GH release + npm in one tag-push.
      wasm-packages: lex-wasm
      wasm-npm-scope: lex-fmt
      # Layer 2 of the cross-repo release cascade (lex-fmt/lex#640). The
      # reusable rust-cli.yml fires `upstream-released` to each repo here
      # after a successful release (release@v3.8.0+). lex's downstreams are the
      # editor extensions, which submodule lex and listen for the two-hop
      # cascade from both lex and tree-sitter-lex. See arthur-debert/release#804.
      notify-downstreams: lex-fmt/vscode lex-fmt/nvim lex-fmt/lexed
    # `secrets: inherit` doesn't propagate cross-org (lex-fmt → arthur-debert),
    # so secrets must be passed explicitly. Note: lex-fmt/lex stores the
    # crates.io token under `CARGO_REGISTRY_TOKEN`; the action's input is
    # `CRATES_IO_KEY`, so we map across.
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
      ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
      CRATES_IO_KEY: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
