name: Rust CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude lex-wasm --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace --exclude lex-wasm

      - name: Test
        run: cargo nextest run --workspace --exclude lex-wasm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tree-sitter CLI
        run: npm install --prefix tree-sitter-lex

      - name: Tree-sitter corpus tests
        run: cd tree-sitter-lex && npx tree-sitter test

      - name: Tree-sitter error-free parsing check
        run: tree-sitter-lex/scripts/error-check.sh

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: cargo doc --workspace --exclude lex-wasm --no-deps --all-features
