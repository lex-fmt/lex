name: shipit-release

# TOL02-WS07 rc-campaign caller: drives lex through shipit's COMPOSED
# release pipeline (ADR-0040) — one `uses:` line against the REAL remote
# wf-release.yml at @v1, the standard-consumer shape (ADR-0010).
#
# Campaign Finding 3/4 (shipit#565) is RESOLVED: shipit was made PUBLIC by
# the owner on 2026-07-11 (mirroring legacy arthur-debert/release), so a
# private-repo cross-owner `uses:` wall no longer exists — lex-fmt/lex
# (org-owned) calls arthur-debert/shipit's (user-owned) reusable workflows
# directly, the nested `@v1` refs resolve, and the launcher's uv git-pin
# clones the now-public shipit. The earlier vendored-blocks run remains
# valid stage evidence; this run verifies the remote-@v1 distribution leg.
#
# Runs ALONGSIDE the legacy release.yml caller — the cutover canon keeps
# legacy callers untouched and running until ADP02 re-points them.
#
# Secrets: the rc plan requires RELEASE_TOKEN only (prepare's tag push
# through the ruleset); gh-release rides the workflow's own GITHUB_TOKEN,
# and every external endpoint (crates/npm/brew) is dropped from a
# -release-rc plan by the central RC guard, so their tokens are neither
# required nor forwarded here.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.19.4-release-rc)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    uses: arthur-debert/shipit/.github/workflows/wf-release.yml@v1
    with:
      version: ${{ inputs.version }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
