name: shipit-release

# TOL02-WS07 rc-campaign caller: drives lex through shipit's COMPOSED
# release pipeline (ADR-0040) — one `uses:` line against wf-release.yml,
# the standard-consumer shape. The composed chain and its stage blocks are
# VENDORED verbatim on this branch (campaign Finding 3, shipit#565: a
# private repo's reusable workflows cannot be `uses:`-called cross-owner,
# and lex is org-owned under lex-fmt while shipit is private under
# arthur-debert; the standard `arthur-debert/shipit/...@v1` remote ref is
# therefore recorded as remote-unverified pending the visibility decision).
# Runs ALONGSIDE the legacy release.yml caller — the cutover canon keeps
# legacy callers untouched and running until ADP02 re-points them.
#
# Secrets: the rc plan requires RELEASE_TOKEN only (prepare's tag push
# through the ruleset); gh-release rides the workflow's own GITHUB_TOKEN,
# and every external endpoint (crates/npm/brew) is dropped from a
# -release-rc plan by the central RC guard, so their tokens are neither
# required nor forwarded here.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.19.4-release-rc)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/wf-release.yml
    with:
      version: ${{ inputs.version }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
