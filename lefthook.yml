        - "**/rustfmt.toml"
      run: cargo fmt --all -- --check
      priority: 2
    cargo-clippy:
      glob:
        - "**/*.rs"
        - "**/Cargo.toml"
        - "**/Cargo.lock"
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      priority: 2
