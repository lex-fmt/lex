# [secrets] — repo Actions secrets. Each table key is the GitHub secret NAME; the
# value names exactly one source ({ doppler = "KEY" } / { env = "VAR" } /
# { prompt = true }). Seeded with shipit's local-reviewer (codex/agy) GitHub App
# credentials, each sourced from Doppler github/prd. `shipit gh-setup` only pushes
# a secret when its source resolves, so these are safe before the App is installed.
#
# ARTIFACT_CHANNEL_* — the Artifact channel's WRITE credential pair (the conda
# derived endpoint's `secretreq.ENDPOINT_SECRETS["conda"]`, ADR-0064/0065): the
# GCS HMAC interop key that repackages+pushes the `.conda` and reindexes this
# repo's per-repo channel. Declared here through the standard source model ONLY —
# `shipit gh-setup` resolves each from Doppler and pushes it; the credential
# VALUES are never copied into the repo. gh-setup only pushes when the source
# resolves, so these are safe before the channel bucket / HMAC key exist.
[secrets]
CODEX_REVIEW_APP_PRIVATE_KEY = { doppler = "CODEX_REVIEW_APP_PRIVATE_KEY" }
CODEX_REVIEW_APP_ID          = { doppler = "CODEX_REVIEW_APP_ID" }
AGY_REVIEW_APP_PRIVATE_KEY   = { doppler = "AGY_REVIEW_APP_PRIVATE_KEY" }
AGY_REVIEW_APP_ID            = { doppler = "AGY_REVIEW_APP_ID" }
ARTIFACT_CHANNEL_KEY_ID      = { doppler = "ARTIFACT_CHANNEL_KEY_ID" }
ARTIFACT_CHANNEL_SECRET_KEY  = { doppler = "ARTIFACT_CHANNEL_SECRET_KEY" }

# [reviewers] — the required-reviewer SET for this repo's PRs (the map KEYS are
# required; ALL must be DONE to flip Ready). Seeded with shipit's shipped default
# (Copilot, review-once), rendered from the single source in
# `prstate.reviewers_config.DEFAULT_REVIEWERS`. codex/agy are NOT seeded by default —
# their review GitHub Apps are not installed on an arbitrary repo, so requiring them
# would park PRs at REVIEWS_PENDING; a repo that HAS the Apps opts them in here (e.g.
# `codex = {}`). Review-once: `rerun` defaults OFF (token-billed; opt in per reviewer
# with e.g. `copilot = { rerun = true }`).
[reviewers]
copilot = {}

# [lint] — consumer-owned paths this repo excludes from the managed lint gate
# (shipit#484). Gitignore-style globs, matched by shipit's own engine; they filter
# the discovered file list BEFORE routing, so each entry drops a path from EVERY
# leg (markdownlint, shfmt, …). This is the reconcile-safe home for these — install
# never clobbers a consumer table — replacing the old OVERRIDE block in the
# shipit-managed `.markdownlintignore` (now back to pristine).
#   - crates/lex-babel/tests/fixtures/ — verbatim upstream reference documents
#     (comrak's README, the CommonMark/comrak markdown references, kitchensink)
#     consumed byte-for-byte by lex-babel's interop tests; reformatting them to
#     satisfy prose rules would corrupt the fixtures and break the tests.
#   - CHANGELOG.md + CHANGELOG/ — CHANGELOG.md is GENERATED from the CHANGELOG/*.md
#     fragments by bin/changelog (release.toml pre-release-hook); the surface also
#     carries the normal changelog shape MD024/no-duplicate-heading misfires on
#     (repeated per-release `### Added` / `### Fixed`).
[lint]
ignore = [
    "crates/lex-babel/tests/fixtures/",
    "CHANGELOG.md",
    "CHANGELOG/",
]

# [lanes] — the declared PR-time check units (ADP02-WS02, lex#828). The lane
# planner (`shipit ci plan`) maps these + the CI event + a path-diff to the job
# matrix the wf-checks workflow block runs (`pixi run --locked <run>` per job).
# Modeled on shipit's own declaration; both lanes' tasks SELF-PROVISION,
# because on a hosted runner nothing outside pixi is provisioned:
#   - `lint-full` (NOT the managed bare `lint` task, which runs in the default
#     env where no lint tool exists) resolves into the pixi lint env and
#     provisions lexd inline — see its definition in pixi.toml
#     [feature.lint.tasks].
#   - `test-full` inits the `comms` submodule (the suite's fixtures) inline
#     before `cargo nextest run --workspace` — the wf-checks checkout has no
#     submodule support; cargo + cargo-nextest + uv (for bin/shipit) ride
#     pixi's default env ([dependencies] in pixi.toml).
[lanes.lint]
run = "lint-full"
required = true
local = true

[lanes.test]
run = "test-full"
required = true
local = true

[toolchains]
"." = "rust"

# [artifacts] — the release surface this repo publishes (lex#832 cutover),
# ported from the legacy `.github/workflows/release.yml` rust-cli.yml caller.
# Three artifacts: the signed `lexd` binary matrix, the `lexd-lsp` binary matrix
# (Artifact channel producer, lex#840), and the `lex-wasm` npm package.
#
#   - lexd: the `[[bin]] name = "lexd"` lives in crate `lex-cli` (its
#     [package].name IS "lexd"), so `package = "lexd"`. Signed darwin + linux
#     gnu (x86_64 + arm64). The legacy linux-musl-archs coverage
#     (linux-x86_64-musl) is TEMPORARILY DROPPED pending shipit musl
#     provisioning (see the platforms comment below); re-add when it lands.
#     windows-x86_64 is OMITTED per the fleet
#     pause (shipit#895), even though the legacy caller listed windows-archs.
#     The `crates` endpoint triggers the workspace-wide crates.io publish in
#     topological order — `lex-wasm` (publish = false) is auto-excluded via
#     cargo metadata, so the legacy explicit `crates:` list is not restated.
#   - lexd-lsp: the `[[bin]] name = "lexd-lsp"` lives in crate `lexd-lsp` (its
#     [package].name IS "lexd-lsp"), so `package = "lexd-lsp"`. Made a
#     first-class released artifact so downstream VS Code packaging (TOL03 WS03,
#     shipit#977/#980) consumes it artifact-pinned through `[artifact-deps]` and
#     this repo's public per-repo conda channel. Same non-Windows matrix
#     as `lexd` — darwin-arm64 + linux gnu (x86_64 + arm64), the three subdirs
#     the Artifact channel serves (osx-arm64, linux-64, linux-aarch64); win-64
#     stays paused (shipit#895), osx-64/musl are unserved by the closed conda
#     subdir map (ADR-0064). The `conda` DERIVED endpoint (after `gh-release`)
#     repackages each release archive into a versioned `.conda`, pushes it to
#     the repo's channel, and reindexes (ADR-0064/0065); its write credentials
#     are the ARTIFACT_CHANNEL_* [secrets] pair. The generated conda package
#     name IS the main-binary name lowercased — exactly `lexd-lsp` — installed
#     at the materialized env `bin/lexd-lsp` WS03 expects. NOT on `crates`: the
#     workspace crates.io publish is `lexd`'s endpoint and already covers the
#     `lexd-lsp` crate topologically; restating it here would double-publish.
#   - lex-wasm: wasm-pack → @lex-fmt/lex-wasm on npm (legacy wasm-packages +
#     wasm-npm-scope). Built on the linux-x86_64 host; the `web`-target wasm
#     output is platform-independent, so one build platform suffices.
[artifacts.lexd]
build = [{ toolchain = "rust", package = "lexd" }]
# musl (linux-x86_64-musl) deferred: shipit's conda-forge rust toolchain has no
# musl rust-std target yet (E0463 can't find crate for core) — a shipit-side gap
# (lex is the first repo to exercise musl through shipit). Re-add once shipit
# provisions musl (shipit musl-provisioning feature issue).
platforms = ["darwin-arm64", "linux-x86_64", "linux-arm64"]
bundle = { composition = "archive" }
# sign = true enables the sign stage, but signing is applied only where
# supported: the darwin-arm64 leg is Apple-signed/notarized; the linux legs
# are NOT signed (no linux signing rail). Do not read the matrix as "all legs
# signed".
sign = true
endpoints = ["gh-release", "crates"]

[artifacts.lexd-lsp]
build = [{ toolchain = "rust", package = "lexd-lsp" }]
# Same served, non-Windows matrix as lexd: darwin-arm64 + linux gnu
# (x86_64 + arm64) map to the conda subdirs osx-arm64 / linux-64 /
# linux-aarch64. windows-x86_64 stays paused (shipit#895); osx-64 and musl are
# outside the closed Artifact-channel subdir map (ADR-0064), so no dropped
# coverage to defer here.
platforms = ["darwin-arm64", "linux-x86_64", "linux-arm64"]
bundle = { composition = "archive" }
# Same posture as lexd: sign = true enables the sign stage, but signing is
# applied only where supported — the darwin-arm64 leg is Apple-signed/notarized;
# the linux legs are NOT signed. The non-Windows matrix above is not all-signed.
sign = true
# gh-release is the base surface the `conda` DERIVED endpoint repackages from
# (a conda endpoint REQUIRES gh-release in the plan). The live channel SEED is
# coordinator-owned and NOT dispatched in this change.
endpoints = ["gh-release", "conda"]

[artifacts.lex-wasm]
build = [{ toolchain = "rust", package = "lex-wasm" }]
platforms = ["linux-x86_64"]
bundle = { composition = "wasm-pack", wasm-target = "web", scope = "lex-fmt" }
endpoints = ["gh-release", "npm"]

